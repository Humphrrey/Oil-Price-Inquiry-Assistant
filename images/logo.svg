<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- 背景 -->
  <rect width="800" height="800" fill="#ffffff"/>
  
  <!-- 渐变定义 -->
  <defs>
    <!-- 主油滴渐变 -->
    <linearGradient id="oilGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7C59F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E86AB;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 主油滴形状 -->
  <g filter="url(#shadow)">
    <path d="M 400 100 
             C 550 120, 650 250, 650 380
             C 650 510, 550 620, 400 650
             C 250 620, 150 510, 150 380
             C 150 250, 250 120, 400 100"
          fill="url(#oilGradient)"
          stroke="none"/>
  </g>
  
  <!-- 内部黑色几何 -->
  <path d="M 400 150
           C 520 165, 600 270, 600 380
           C 600 490, 520 580, 400 600
           C 280 580, 200 490, 200 380
           C 200 270, 280 165, 400 150"
        fill="#1a1a1a"/>
  
  <!-- 核心白色 -->
  <path d="M 400 210
           C 500 220, 560 310, 560 380
           C 560 450, 500 520, 400 540
           C 300 520, 240 450, 240 380
           C 240 310, 300 220, 400 210"
        fill="#ffffff"/>
  
  <!-- 装饰线 - 数据点 -->
  <rect x="180" y="380" width="40" height="4" fill="#FF6B35"/>
  <rect x="580" y="380" width="40" height="4" fill="#FF6B35"/>
  <rect x="398" y="140" width="4" height="40" fill="#FF6B35"/>
  <rect x="398" y="560" width="4" height="40" fill="#FF6B35"/>
  
  <!-- 标题文字 -->
  <text x="400" y="720" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="56" 
        font-weight="300" 
        fill="#1a1a1a" 
        text-anchor="middle" 
        letter-spacing="8">油价助手</text>
  
  <!-- 副标题 -->
  <text x="400" y="760" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
        font-size="16" 
        font-weight="300" 
        fill="#666666" 
        text-anchor="middle" 
        letter-spacing="4">OIL PRICE ASSISTANT</text>
</svg>
