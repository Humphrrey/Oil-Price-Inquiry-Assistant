<?xml version="1.0" encoding="UTF-8"?>
<!-- 小程序图标 - 192x192 圆形 -->
<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="oilGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7C59F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E86AB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="96" cy="96" r="96" fill="#ffffff"/>
  
  <!-- 主油滴 -->
  <path d="M 96 20 
           C 130 25, 160 55, 160 90
           C 160 125, 130 155, 96 165
           C 62 155, 32 125, 32 90
           C 32 55, 62 25, 96 20"
        fill="url(#oilGradient)"/>
  
  <!-- 内部黑色 -->
  <path d="M 96 35
           C 125 40, 145 65, 145 90
           C 145 115, 125 140, 96 150
           C 67 140, 47 115, 47 90
           C 47 65, 67 40, 96 35"
        fill="#1a1a1a"/>
  
  <!-- 核心 -->
  <path d="M 96 50
           C 118 55, 132 72, 132 90
           C 132 108, 118 125, 96 130
           C 74 125, 60 108, 60 90
           C 60 72, 74 55, 96 50"
        fill="#ffffff"/>
  
  <!-- 油滴尖端 -->
  <path d="M 96 20 L 96 10 L 100 15 Z" fill="#FF6B35"/>
</svg>
